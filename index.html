<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KlikGuru - Jurnal & Absensi Guru</title>
  <!-- Google Fonts Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex justify-center items-start">
  
  <!-- Mobile Container Wrapper -->
  <div class="w-full max-w-md min-h-screen bg-slate-950 shadow-2xl flex flex-col relative overflow-x-hidden border-x border-slate-800">
    
    <!-- Loading Screen Overlay -->
    <div id="app-loading" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center z-50 transition-opacity duration-300">
      <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-4 text-slate-400 font-medium text-sm">Menyiapkan Aplikasi...</p>
    </div>

    <!-- App Header (Hidden on Login Page) -->
    <header id="app-header" class="hidden sticky top-0 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4 justify-between items-center z-40">
      <div class="flex items-center gap-2">
        <!-- Logo KlikGuru SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="w-8 h-8 drop-shadow-[0_2px_8px_rgba(16,185,129,0.2)]" fill="none">
          <defs>
            <linearGradient id="logo-grad-header" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#34d399" />
              <stop offset="100%" stop-color="#059669" />
            </linearGradient>
          </defs>
          <path d="M 72 28 C 64 18, 36 18, 26 28 C 12 42, 12 68, 26 82 C 36 92, 64 92, 72 82" stroke="url(#logo-grad-header)" stroke-width="8" stroke-linecap="round" />
          <path d="M 34 40 H 52" stroke="#64748b" stroke-width="4" stroke-linecap="round" opacity="0.8" />
          <path d="M 34 52 H 45" stroke="#64748b" stroke-width="4" stroke-linecap="round" opacity="0.8" />
          <path d="M 34 64 H 52" stroke="#64748b" stroke-width="4" stroke-linecap="round" opacity="0.8" />
          <path d="M 48 55 L 56 63 L 74 45" stroke="#34d399" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M 74 45 L 89 58 L 81 59 L 85 69 L 80 71 L 76 61 L 71 64 Z" fill="#059669" stroke="#34d399" stroke-width="1.5" stroke-linejoin="round" />
        </svg>
        <span class="font-bold text-lg tracking-tight bg-gradient-to-r from-emerald-400 to-teal-300 bg-clip-text text-transparent">KlikGuru</span>
      </div>
      <button id="btn-logout" class="p-2 text-slate-400 hover:text-rose-400 hover:bg-slate-800 rounded-lg transition-colors" title="Keluar">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </button>
    </header>

    <!-- Main Content App Mount -->
    <main id="app-content" class="flex-1 flex flex-col p-4 pb-24"></main>

    <!-- Navigation Bar (Hidden on Login Page) -->
    <nav id="app-nav" class="hidden fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-slate-900/90 backdrop-blur-md border-t border-slate-800 p-2 flex justify-around items-center z-40">
      <button id="nav-jurnal" class="flex flex-col items-center gap-1 py-1 px-3 text-slate-400 hover:text-emerald-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
        <span class="text-[10px] font-medium">Jurnal</span>
      </button>
      <button id="nav-rekap" class="flex flex-col items-center gap-1 py-1 px-3 text-slate-400 hover:text-emerald-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
        <span class="text-[10px] font-medium">Rekap</span>
      </button>
      <button id="nav-settings" class="flex flex-col items-center gap-1 py-1 px-3 text-emerald-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0" />
        </svg>
        <span class="text-[10px] font-semibold">Pengaturan</span>
      </button>
    </nav>

  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
